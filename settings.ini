[interface]
selfDestroyTime = 5000 ; auto destroy popup window after 5 sec
lang = en ; en, ru .text language
hotkey = ctrl+x ; show popup window by keyboard
wraplength = 250 ; long text linebreak
alpha = 0.9 ; window transparensy
fontName = TkDefaultFont 
fontSize = 12
fontColor = white ; white, black, red, green, blue, cyan, yellow, magenta, purple, pink, brown, gray
fontBack = black
frameBack = black